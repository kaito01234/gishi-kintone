name: Issue to PR by Claude Code

on:
  issues:
    types: [labeled]

jobs:
  claude:
    if: >
      github.event.label.name == 'claude' &&
      contains(fromJSON(vars.CLAUDE_CODE_ALLOWED_USERS), github.actor)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
